<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Woolknot Admin · Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:     #1A1612;
    --bg-deep:     #14110D;
    --bg-soft:     #2A2520;
    --cream:       #EDE4D5;
    --cream-dim:   rgba(245, 240, 232, 0.55);
    --cream-faint: rgba(245, 240, 232, 0.16);
    --gold:        #B8885A;
    --line:        rgba(245, 240, 232, 0.18);
    --danger:      #E89090;
    --serif: 'Fraunces', serif;
    --sans:  'Futura', 'Futura PT', 'Futura LT', 'Jost', 'Avenir Next', system-ui, sans-serif;
    --mono:  'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
  body {
    background: var(--bg-dark);
    color: var(--cream);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 36px 36px;
  }

  .brand {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 28px;
    letter-spacing: -0.005em;
    margin-bottom: 6px;
  }
  .brand span { color: var(--gold); }

  .sub {
    font-size: 13px;
    color: var(--cream-dim);
    margin-bottom: 32px;
    line-height: 1.55;
  }

  label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    display: block;
    margin-bottom: 10px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg-dark);
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 24px;
    letter-spacing: 12px;
    padding: 14px 18px;
    text-align: center;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder {
    color: var(--cream-faint);
    letter-spacing: 8px;
  }

  .btn {
    background: var(--cream);
    color: var(--bg-dark);
    border: 1px solid var(--cream);
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px 22px;
    width: 100%;
    cursor: pointer;
    border-radius: 3px;
    margin-top: 18px;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .btn:hover:not(:disabled) { background: var(--gold); border-color: var(--gold); color: var(--bg-deep); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--cream-dim);
    min-height: 16px;
    text-align: center;
  }
  .msg.error { color: var(--danger); }
  .msg.success { color: var(--gold); }

  .hint {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--cream-dim);
    line-height: 1.6;
  }
  .hint a {
    color: var(--gold);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
</head>
<body>

<div class="card">
  <h1 class="brand">Woolknot <span>Admin</span></h1>
  <p class="sub">Authenticator uygulamanızdaki <strong style="color:var(--cream)">6 haneli kodu</strong> girin.</p>

  <label for="code">Doğrulama Kodu</label>
  <input type="text" id="code" maxlength="6" placeholder="••••••" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]*" autofocus />
  <button class="btn" id="verifyBtn">Giriş Yap</button>

  <p class="msg" id="msg"></p>

  <p class="hint">
    İlk kez mi giriyorsunuz? Authenticator app kurulumu için <a href="/admin/setup">/admin/setup</a> sayfasını ziyaret edin.
  </p>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const msg = $('msg');

  function setMsg(text, type) {
    msg.textContent = text || '';
    msg.className = 'msg' + (type ? ' ' + type : '');
  }

  async function verify() {
    const code = $('code').value.trim();
    if (!/^\d{6}$/.test(code)) { setMsg('6 haneli kod girin', 'error'); return; }
    setMsg('Doğrulanıyor...');
    $('verifyBtn').disabled = true;
    try {
      const r = await fetch('/admin/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const d = await r.json();
      if (d.success) {
        setMsg('Giriş başarılı, yönlendiriliyor...', 'success');
        window.location.href = d.redirect || '/admin';
      } else {
        setMsg(d.message || 'Hata', 'error');
        $('verifyBtn').disabled = false;
        $('code').value = '';
        $('code').focus();
      }
    } catch (err) {
      setMsg('Bağlantı hatası', 'error');
      $('verifyBtn').disabled = false;
    }
  }

  $('verifyBtn').addEventListener('click', verify);
  $('code').addEventListener('keydown', (e) => { if (e.key === 'Enter') verify(); });
  $('code').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^\d]/g, '').slice(0, 6);
    if (e.target.value.length === 6) verify();
  });
</script>
</body>
</html>
