<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Woolknot Admin · Başvurular</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #1A1612;
    --navy-deep:   #14110D;
    --navy-soft:   #2A2520;
    --cream:       #EDE4D5;
    --cream-dim:   rgba(245, 240, 232, 0.55);
    --cream-faint: rgba(245, 240, 232, 0.16);
    --gold:        #B8885A;
    --rug-red:     #8B2820;
    --line:        rgba(245, 240, 232, 0.18);
    --danger:      #E89090;
    --serif: 'Fraunces', serif;
    --sans:  'Manrope', system-ui, sans-serif;
    --mono:  'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
  body {
    background: var(--navy);
    color: var(--cream);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 32px 28px 64px;
  }

  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .wrap { max-width: 1280px; margin: 0 auto; }

  /* Header */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .top h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 32px;
    line-height: 1;
  }
  .top h1 span { color: var(--gold); font-style: italic; }
  .top .meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--navy-deep);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream-dim);
    display: block;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.muted { color: var(--cream-dim); }
  .stat-value.gold { color: var(--gold); }
  .stat .sub {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    color: var(--cream-dim);
  }

  /* Counter actions */
  .counter-card {
    background: var(--navy-deep);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 22px 24px;
    margin-bottom: 32px;
  }
  .counter-card h2 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }
  .ctrl-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .ctrl-row input[type="number"] {
    background: var(--navy);
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 14px;
    padding: 9px 12px;
    width: 100px;
    border-radius: 2px;
  }
  .btn {
    background: var(--cream);
    color: var(--navy);
    border: 1px solid var(--cream);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent;
    color: var(--cream);
    border-color: var(--line);
  }
  .btn-ghost:hover { border-color: var(--cream-dim); }
  .btn-gold {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy-deep);
  }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: rgba(232, 144, 144, 0.4);
  }
  .btn-danger:hover { background: rgba(232, 144, 144, 0.1); }

  /* Table */
  .table-card {
    background: var(--navy-deep);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 22px 24px;
  }
  .table-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .table-head h2 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }
  .table-head .table-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search {
    background: var(--navy);
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 12px;
    width: 220px;
    border-radius: 2px;
    outline: none;
  }
  .search:focus { border-color: var(--gold); }

  .scroll {
    overflow-x: auto;
    margin: 0 -10px;
    padding: 0 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 12px 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    font-weight: 500;
    white-space: nowrap;
  }
  tbody tr:hover { background: rgba(242, 234, 216, 0.025); }
  td.email, td.phone { font-family: var(--mono); font-size: 12px; }
  td.time { font-family: var(--mono); font-size: 11px; color: var(--cream-dim); white-space: nowrap; }
  td.actions { white-space: nowrap; }
  .del-btn {
    background: transparent;
    border: 1px solid rgba(232, 144, 144, 0.3);
    color: var(--danger);
    cursor: pointer;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .del-btn:hover { background: rgba(232, 144, 144, 0.12); }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--cream-dim);
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--gold);
    color: var(--navy-deep);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 18px;
    border-radius: 2px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 760px) {
    body { padding: 20px 16px 48px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .top h1 { font-size: 24px; }
    .stat-value { font-size: 26px; }
    .search { width: 100%; }
    .table-head .table-actions { width: 100%; }
    /* hide ip + userAgent on mobile */
    .col-ip, .col-source { display: none; }
  }
  @media (max-width: 460px) {
    .stats { grid-template-columns: 1fr; }
    .col-company, .col-interest { display: none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <h1>Woolknot <span>Admin</span></h1>
    <div class="meta">
      <span><a href="/" target="_blank">→ Forma git</a></span>
      <span id="lastUpdate">—</span>
      <span><a href="#" id="logoutBtn">Çıkış</a></span>
    </div>
  </header>

  <!-- Stats -->
  <section class="stats">
    <div class="stat">
      <span class="stat-label">DB Kayıt</span>
      <span class="stat-value" id="dbCount">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Sayaç (Abacus)</span>
      <span class="stat-value gold" id="abacusCount">—</span>
      <span class="sub" id="abacusOf">/ <span id="totalCap">20</span></span>
    </div>
    <div class="stat">
      <span class="stat-label">Kalan Hak</span>
      <span class="stat-value" id="remaining">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Durum</span>
      <span class="stat-value muted" id="statusText" style="font-size:18px">—</span>
    </div>
  </section>

  <!-- Counter management -->
  <section class="counter-card">
    <h2>Sayaç Yönetimi</h2>
    <div class="ctrl-row">
      <input type="number" id="setVal" min="0" max="999" placeholder="Sayı">
      <button class="btn" onclick="setCounter()">Set Et</button>
      <button class="btn btn-ghost" onclick="bumpCounter(1)">+1</button>
      <button class="btn btn-ghost" onclick="bumpCounter(-1)">−1</button>
      <button class="btn btn-ghost" onclick="resetCounter()">Sıfırla</button>
      <button class="btn btn-gold" id="forceFullBtn" onclick="toggleFull()">DOLDU Yap</button>
    </div>
  </section>

  <!-- Submissions -->
  <section class="table-card">
    <div class="table-head">
      <h2>Başvurular <span id="rowCount" style="color: var(--cream-dim); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; margin-left: 8px;"></span></h2>
      <div class="table-actions">
        <input type="search" class="search" id="search" placeholder="İsim, e-posta, telefon...">
        <a class="btn btn-ghost" href="/admin/api/export.csv" download>CSV İndir</a>
        <button class="btn btn-ghost" onclick="loadAll()">Yenile</button>
      </div>
    </div>
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Ad Soyad</th>
            <th>E-posta</th>
            <th>Telefon</th>
            <th class="col-company">Şirket</th>
            <th class="col-interest">İlgi</th>
            <th class="col-source">Kaynak</th>
            <th class="col-ip">IP</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">Henüz başvuru yok.</div>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);
  let allRows = [];

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function tr(s) {
    const escape = (v) => String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const dt = new Date(s.timestamp);
    const dateStr = isNaN(dt) ? s.timestamp : dt.toLocaleString('tr-TR', { dateStyle: 'short', timeStyle: 'short' });
    return `<tr data-id="${escape(s.id)}">
      <td class="time">${escape(dateStr)}</td>
      <td>${escape(s.fullname)}</td>
      <td class="email"><a href="mailto:${escape(s.email)}">${escape(s.email)}</a></td>
      <td class="phone"><a href="tel:${escape(s.phone)}">${escape(s.phone)}</a></td>
      <td class="col-company">${escape(s.company || '—')}</td>
      <td class="col-interest">${escape(s.interest || '—')}</td>
      <td class="col-source">${escape(s.source || '—')}</td>
      <td class="col-ip"><span style="color:var(--cream-dim);font-family:var(--mono);font-size:11px">${escape(s.ip || '')}</span></td>
      <td class="actions"><button class="del-btn" onclick="del('${escape(s.id)}')">Sil</button></td>
    </tr>`;
  }

  function renderRows(rows) {
    const tbody = $('rows');
    if (!rows.length) {
      tbody.innerHTML = '';
      $('emptyState').style.display = '';
    } else {
      $('emptyState').style.display = 'none';
      tbody.innerHTML = rows.map(tr).join('');
    }
    $('rowCount').textContent = rows.length ? `(${rows.length})` : '';
  }

  async function loadSubmissions() {
    const r = await fetch('/admin/api/submissions');
    if (!r.ok) { toast('Başvurular alınamadı'); return; }
    allRows = await r.json();
    applyFilter();
  }

  function applyFilter() {
    const q = $('search').value.trim().toLowerCase();
    if (!q) { renderRows(allRows); return; }
    renderRows(allRows.filter(s =>
      [s.fullname, s.email, s.phone, s.company, s.interest, s.source]
        .filter(Boolean).join(' ').toLowerCase().includes(q)
    ));
  }

  async function loadCounter() {
    const r = await fetch('/admin/api/counter');
    if (!r.ok) { toast('Sayaç alınamadı'); return; }
    const c = await r.json();
    const cur = c.abacusValue ?? 0;
    const tot = c.total ?? 20;
    const remaining = Math.max(0, tot - cur);
    $('dbCount').textContent = c.submissionsCount;
    $('abacusCount').textContent = cur;
    $('totalCap').textContent = tot;
    $('remaining').textContent = remaining;
    if (c.forceFull) {
      $('statusText').textContent = 'Manuel DOLDU';
      $('statusText').style.color = 'var(--gold)';
      $('forceFullBtn').textContent = 'DOLDU İptal Et';
    } else if (cur >= tot) {
      $('statusText').textContent = 'Kontenjan Doldu';
      $('statusText').style.color = 'var(--gold)';
      $('forceFullBtn').textContent = 'DOLDU Yap';
    } else {
      $('statusText').textContent = 'Açık';
      $('statusText').style.color = 'var(--cream)';
      $('forceFullBtn').textContent = 'DOLDU Yap';
    }
    $('lastUpdate').textContent = 'Güncel: ' + new Date().toLocaleTimeString('tr-TR');
  }

  async function loadAll() {
    await Promise.all([loadSubmissions(), loadCounter()]);
  }

  async function setCounter() {
    const v = parseInt($('setVal').value, 10);
    if (isNaN(v) || v < 0) { toast('Geçerli bir sayı girin'); return; }
    const r = await fetch('/admin/api/counter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: v }),
    });
    if (!r.ok) { toast('Hata'); return; }
    $('setVal').value = '';
    toast('Sayaç güncellendi: ' + v);
    loadCounter();
  }

  async function bumpCounter(delta) {
    const r = await fetch('/admin/api/counter');
    const c = await r.json();
    const next = Math.max(0, (c.abacusValue ?? 0) + delta);
    const r2 = await fetch('/admin/api/counter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: next }),
    });
    if (r2.ok) {
      toast(delta > 0 ? '+1' : '−1');
      loadCounter();
    }
  }

  async function resetCounter() {
    if (!confirm('Sayaç sıfırlansın mı?')) return;
    const r = await fetch('/admin/api/counter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: 0 }),
    });
    if (r.ok) { toast('Sıfırlandı'); loadCounter(); }
  }

  async function toggleFull() {
    const r = await fetch('/admin/api/counter');
    const c = await r.json();
    const r2 = await fetch('/admin/api/counter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ forceFull: !c.forceFull }),
    });
    if (r2.ok) { toast(!c.forceFull ? 'DOLDU işaretlendi' : 'DOLDU iptal edildi'); loadCounter(); }
  }

  async function del(id) {
    const row = allRows.find(x => x.id === id);
    const who = row ? row.fullname : 'kayıt';
    if (!confirm(who + ' silinsin mi?')) return;
    const r = await fetch('/admin/api/submissions/' + encodeURIComponent(id), { method: 'DELETE' });
    if (r.ok) { toast('Silindi'); loadAll(); }
  }

  $('search').addEventListener('input', applyFilter);

  $('logoutBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/admin/logout', { method: 'POST' });
    window.location.href = '/admin/login';
  });

  loadAll();
  // Auto-refresh counter every 30s
  setInterval(loadCounter, 30000);
</script>
</body>
</html>
